<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Skyway Flight Booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>


<div class="booking-success mx-auto">
    <h3 class="text-center mb-4">
        Booking Confirmed!
    </h3>
    <h6 class="text-center mb-4" style="color:#94a3c5;"> Your ticket has been issued successfully </h6>
    <h4 class="text-center mb-4" style="margin-top:20px;color:#ffc107">
        #AIR-8775#
    </h4>
    <div class="route-container">

        <div class="city-block text-light">

            <h2 id="source"></h2>

        </div>

        <div class="flight-center">

            <div class="plane-icon">
                <i class="fa-solid fa-plane"></i>
            </div>

        </div>

        <div class="city-block text-end text-light">

            <h2 id="destination"></h2>

        </div>

    </div>

    <hr style="border:1px solid #ffc107;">

    <div class="booking-details">

        <div class="booking-item">

            <span>PASSENGER</span>
            <h4 id="passenger"></h4>

        </div>

        <div class="booking-item">

            <span>FLIGHT</span>
            <h4 id="flightNo"></h4>


        </div>

        <div class="booking-item">

            <span>SEAT</span>
            <h4 id="seatNo"></h4>

        </div>

    </div>

    <div class="booking-details">

        <div class="booking-item">

            <span>CLASS</span>
            <h4 id="seatClass"></h4>

        </div>

        <div class="booking-item">

            <span>AGE</span>
            <h4 id="age"></h4>

        </div>

        <div class="booking-item">

            <span>Price</span>
            <h4 id="price"></h4>

        </div>
    </div>

    <button onclick=""
            class="btn btn-warning w-100 mt-3">

          Back To Flight

    </button>
</div>
<script src="/js/booking_success.js"></script>

</body>
</html>
