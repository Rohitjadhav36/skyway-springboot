<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Skyway Flight Booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="/admin/css/adminstyle.css">
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">

    <nav class="navbar">
        <h3>
            Manage Airport
        </h3>
    </nav>
    <div class="airport-container">

        <div class="airport-header">

            <h3>Airport Directory</h3>

            <span id="airportCount">
            0 airports
        </span>

        </div>

        <hr>

        <div class="airport-form">

            <input
                    type="text"
                    id="airportCode"
                    class="form-control"
                    placeholder="CODE (E.G. DEL)">

            <input
                    type="text"
                    id="airportName"
                    class="form-control"
                    placeholder="Airport Name">

            <button
                    class="btn btn-warning"
                    onclick="saveAirport()">

                + Add

            </button>

        </div>

        <div
                class="row mt-4"
                id="airportContainer">

        </div>

    </div>

</div>
<script src="/admin/js/airport_loder.js"></script>

</body>
</html>
