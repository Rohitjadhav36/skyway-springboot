<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Skyway Flight Booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="/admin/css/adminstyle.css">
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">

    <nav class="navbar">
        <h3>
            <i class="fa-solid fa-plane"></i>
            Manage Flights
        </h3>
    </nav>

    <div class="row g-4 mb-4">

        <div class="col-md-3">

            <div class="stats-card">

                <h1 id="totalFlights">0</h1>

                <p>TOTAL FLIGHTS</p>

            </div>

        </div>

        <div class="col-md-3">

            <div class="stats-card">

                <h1 id="totalBookings">0</h1>

                <p>TOTAL BOOKINGS</p>

            </div>

        </div>

        <div class="col-md-3">

            <div class="stats-card">

                <h1>98%</h1>

                <p>ON-TIME RATE</p>

            </div>

        </div>

        <div class="col-md-3">

            <div class="stats-card">

                <h1>₹4.2L</h1>

                <p>REVENUE</p>

            </div>

        </div>

    </div>

    <div class="flight-table-container">

        <div class="table-header">

            <h4 class="get-space">Flight Schedule</h4>

            <button
                    class="btn btn-warning text-end"
                    onclick="openAddFlight()">

                + Add New Flight

            </button>

        </div>

        <table class="table table-details">

            <thead>

            <tr>

                <th>Flight ID</th>
                <th>Source</th>
                <th>Destination</th>
                <th>Departure</th>
                <th>Status</th>
                <th>Actions</th>

            </tr>

            </thead>

            <tbody id="flightTableBody">

            </tbody>

        </table>

    </div>


</div>

<script src="/admin/js/sidebar-loader.js"></script>

</body>
</html>
