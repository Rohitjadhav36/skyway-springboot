<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Skyway Flight Booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="/admin/css/adminstyle.css">
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">

    <nav class="navbar">
        <h3>
           View Bookings
        </h3>
    </nav>
    <!-- BOOKINGS SECTION -->
    <div class="section" id="sec-bookings">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-val" id="total-bookings">
                    6
                </div>
                <div class="stat-label">
                    Total Bookings
                </div>
                <div class="stat-icon">📋</div>
            </div>
            <div class="stat-card">

                <div class="stat-val" id="confirmed-b">
                    5
                </div>
                <div class="stat-label">
                    Confirmed
                </div>
                <div class="stat-icon">✅</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="cancelled-b">
                    1
                </div><div class="stat-label">
                Cancelled
            </div>
                <div class="stat-icon">❌</div></div>
        </div>
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">
                    All Bookings
                </div></div>
            <div class="panel-body" id="bookings-list"></div>
        </div>
    </div>

</div>
</div>



    </div>

</div>
<script src="/admin/js/booking_loader.js"></script>

</body>
</html>
